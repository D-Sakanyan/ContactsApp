<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit contact</title>
</head>
<body>
<h1>Edit contact</h1>
<form action="/contacts/create" th:object="${contact}" method="post">
    <div>
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" required th:value="${contact.firstName}">
    </div>
    <div>
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" required th:value="${contact.lastName}">
    </div>
    <div>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" required th:field="*{email}">
        <div th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
    </div>
    <div>
        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" required th:field="*{phone}">
        <div th:if="${#fields.hasErrors('phone')}"
             th:errors="*{phone}"></div>
    </div>
    <button type="submit">Save</button>
</form>
</body>
</html>
